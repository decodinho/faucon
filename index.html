<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://vjs.zencdn.net" rel="stylesheet" />
  <script src="https://vjs.zencdn.net"></script>
  <script src="playerFalcon.js"></script>

  <style>
    :root {
      --jw-bg: #141414; /* Noir plus profond */
      --jw-card-bg: #ffffff;
      --turquoise: #40E0D0;
      --nav-bg: #1E2A38; /* [NOUVEAU] Bleu Anthracite Mariage Turquoise/Noir */
      --live-red: #FF4B4B;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background-color: var(--jw-bg);
      color: white;
    }

    /* Navbar stylisée */
    .navbar {
      background-color: var(--nav-bg);
      color: white;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--turquoise); /* Rappel turquoise */
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.4rem; color: var(--turquoise); }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.3s;
    }

    .nav-btn:hover { background: var(--turquoise); color: var(--nav-bg); border-color: var(--turquoise); }

    /* Bouton Live spécifique */
    .btn-live { border-color: var(--live-red); color: var(--live-red); font-weight: bold; }
    .btn-live:hover { background: var(--live-red); color: white; }
    .dot { height: 8px; width: 8px; background-color: var(--live-red); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .main-content { padding: 20px 0; }
    .category-header { padding: 0 40px; margin-bottom: 15px; }
    .category-header h2 { font-size: 1.4rem; color: var(--turquoise); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

    .video-gallery { display: flex; overflow-x: auto; padding: 10px 40px; gap: 20px; }
    .video-gallery::-webkit-scrollbar { height: 6px; }
    .video-gallery::-webkit-scrollbar-thumb { background: var(--turquoise); border-radius: 10px; }

    .video-card {
      min-width: 260px; background: var(--jw-card-bg); border-radius: 6px;
      overflow: hidden; transition: 0.3s; cursor: pointer; color: #333;
    }
    .video-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(64, 224, 208, 0.3); }

    .thumbnail-container { position: relative; width: 100%; height: 146px; background: #000; }
    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
    .video-info { padding: 12px; }
    .video-info h3 { font-size: 0.9rem; margin: 0; height: 2.6em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(`https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com/dev/read?category={categoryKey}`)
          .then(res => res.json())
          .then(data => {
            let parsed = typeof data === 'string' ? JSON.parse(data) : data;
            setVideos(Array.isArray(parsed) ? parsed : [parsed]);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section style={{marginBottom: '40px'}}>
          <div className="category-header"><h2>{title}</h2></div>
          <div className="video-gallery">
            {loading ? <p>Chargement...</p> : videos.map((v, i) => (
              <div className="video-card" key={i} onClick={() => window.lancerStreaming(v.hls_manifest_url)}>
                <div className="thumbnail-container">
                  <img src={v.thumbnail_url || v.image || "https://via.placeholder.com"} alt="" />
                </div>
                <div className="video-info">
                  <h3>{v.title || "Vidéo Falcon"}</h3>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function App() {
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports" }
      ];

      return (
        <div>
          <header className="navbar">
            <div className="logo-section">
              <i className="fas fa-play-circle"></i>
              <span>FALCON</span>
            </div>
            
            <div className="nav-right">
              <button className="nav-btn btn-live"><span className="dot"></span> LIVE</button>
              <button className="nav-btn"><i className="fas fa-users"></i> Watch with Friends</button>
              <button className="nav-btn"><i className="fas fa-globe"></i> Langues</button>
              <button className="nav-btn"><i className="fas fa-user-circle"></i> Connexion</button>
            </div>
          </header>

          <main className="main-content">
            <div style={{height: '300px', background: 'linear-gradient(45deg, #1E2A38, #40E0D0)', margin: '0 40px 40px 40px', borderRadius: '12px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', boxShadow: '0 10px 20px rgba(0,0,0,0.5)'}}>
                <h1 style={{fontSize: '2.5rem', textShadow: '2px 2px 4px rgba(0,0,0,0.5)'}}>PROCHAINEMENT EN LIVE</h1>
            </div>
            {categories.map(cat => <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />)}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
