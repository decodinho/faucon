<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  
  <!-- Corrections des liens CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <link href="https://unpkg.com/video.js@8.10.0/dist/video-js.css" rel="stylesheet">

  <!-- Scripts React et Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Video.js -->
  <script src="https://unpkg.com/video.js@8.10.0/dist/video.min.js"></script>

  <style>
    :root {
      --jw-bg: #1a1a1a;
      --jw-card-bg: #ffffff;
      --turquoise: #40E0D0;
      --nav-bg: #24292E; 
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background-color: var(--jw-bg);
      color: white;
    }

    .navbar {
      background-color: var(--nav-bg);
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
    .nav-right { display: flex; align-items: center; gap: 15px; }

    .nav-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid white;
      color: white;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .lang-dropdown {
      position: absolute;
      top: 45px;
      right: 0;
      background: var(--nav-bg);
      border: 1px solid var(--turquoise);
      border-radius: 4px;
      min-width: 150px;
      z-index: 100;
    }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .lang-item:hover { background: var(--turquoise); color: black; }

    .category-section { padding: 20px 40px; }
    .category-header h2 { color: var(--turquoise); margin-bottom: 15px; }

    .video-gallery { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; }

    .video-card {
      min-width: 260px;
      background: var(--jw-card-bg);
      border-radius: 4px;
      overflow: hidden;
      color: black;
      cursor: pointer;
    }

    .thumbnail-container { position: relative; height: 146px; background: #000; }
    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
    .video-info { padding: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Simulation de la fonction de lecture si playerFalcon.js est absent
    window.lancerStreaming = window.lancerStreaming || ((url) => {
        alert("Lecture du flux : " + (url || "Flux par défaut H.264"));
    });

    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const url = `https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com/dev/read?category=${categoryKey}`;
        fetch(url)
          .then(res => res.json())
          .then(data => {
            let parsed = typeof data === 'string' ? JSON.parse(data) : data;
            if (parsed && !Array.isArray(parsed)) parsed = [parsed];
            setVideos(parsed || []);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section className="category-section">
          <div className="category-header"><h2>{title}</h2></div>
          <div className="video-gallery">
            {loading ? <p>Chargement...</p> : videos.map((v, i) => (
              <div className="video-card" onClick={() => window.lancerStreaming(v.hls_manifest_url)} key={i}>
                <div className="thumbnail-container">
                  <img src={v.thumbnail_url || "https://via.placeholder.com"} alt={v.title} />
                </div>
                <div className="video-info">
                  <h3 style={{fontSize:'0.9rem', margin:'0'}}>{v.title || "Sans titre"}</h3>
                  <p style={{fontSize:'0.8rem', color:'#666'}}>{v.uploader_id || "Falcon"}</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function App() {
      const [showLangs, setShowLangs] = useState(false);
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports" },
        { id: "Cuisine", label: "Cuisine" },
        { id: "Learning", label: "Learning" },
      ];

      return (
        <div>
          <header className="navbar">
            <div className="logo-section"><span>FALCON</span></div>
            <div className="nav-right">
              <button className="nav-btn">LIVE</button>
              
              <div style={{position: 'relative'}}>
                <button className="nav-btn" onClick={() => setShowLangs(!showLangs)}>
                  <i className="fas fa-globe"></i> Langues
                </button>
                {showLangs && (
                  <div className="lang-dropdown">
                    <a href="index.html" className="lang-item"><img src="https://flagcdn.com" width="20"/> Français</a>
                    <a href="indexEN.html" className="lang-item"><img src="https://flagcdn.com" width="20"/> English</a>
                    <a href="indexES.html" className="lang-item"><img src="https://flagcdn.com" width="20"/> Español</a>
                  </div>
                )}
              </div>
              
              <button className="nav-btn">Connexion</button>
            </div>
          </header>

          <main>
            {categories.map(cat => (
              <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />
            ))}
          </main>
        </div>
      );
    }

    // CRUCIAL : Rendu de l'application dans le DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
