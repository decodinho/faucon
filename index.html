<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <style>
    :root {
      --jw-bg: #1a1a1a;
      --jw-card-bg: #ffffff;
      --turquoise: #40E0D0;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--jw-bg);
    }

    /* Navbar avec les 3 boutons regroupés */
    .navbar {
      background-color: var(--turquoise);
      color: white;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
    
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Style commun des boutons de la navbar */
    .nav-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: white;
      color: var(--turquoise);
      border-color: white;
    }

    /* Main Content */
    .main-content { padding: 20px 0; }
    .category-section { margin-bottom: 30px; }
    .category-header { padding: 0 40px; margin-bottom: 15px; }
    .category-header h2 { font-size: 1.4rem; color: var(--turquoise); margin: 0; }

    /* Galerie & Cartes */
    .video-gallery { display: flex; overflow-x: auto; padding: 10px 40px; gap: 20px; scroll-behavior: smooth; }
    .video-gallery::-webkit-scrollbar { height: 6px; }
    .video-gallery::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

    .video-card {
      min-width: 260px;
      background: var(--jw-card-bg);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      cursor: pointer;
    }
    .video-card:hover { transform: scale(1.03); }

    .thumbnail-container { position: relative; width: 100%; height: 146px; background: #000; }
    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }

    .video-info { padding: 12px; color: black; }
    .video-info h3 { font-size: 0.9rem; margin: 0 0 5px 0; height: 2.5em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .video-info p { font-size: 0.75rem; color: #666; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(`https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com{categoryKey}`)
          .then(res => res.json())
          .then(data => {
            let parsed = typeof data === 'string' ? JSON.parse(data) : data;
            setVideos(Array.isArray(parsed) ? parsed : [parsed]);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section className="category-section">
          <div className="category-header"><h2>{title}</h2></div>
          <div className="video-gallery">
            {loading ? <p style={{color:'white'}}>...</p> : videos.map((v, i) => (
              <div className="video-card" key={v.PK || i}>
                <div className="thumbnail-container">
                  <img src={v.thumbnail_url || v.image || "https://via.placeholder.com"} alt={v.title} />
                </div>
                <div className="video-info">
                  <h3>{v.title || "Vidéo sans titre"}</h3>
                  <p>Falcon Stream</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function App() {
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports" }
      ];

      return (
        <div>
          <header className="navbar">
            <div className="logo-section">
              <i className="fas fa-bars"></i>
              <span>FALCON</span>
            </div>
            
            <div className="nav-right">
              {/* Bouton Langues */}
              <button className="nav-btn">
                <i className="fas fa-globe"></i>
                <span>Langues</span>
              </button>
              
              {/* Bouton Sélection / Playlist */}
              <button className="nav-btn">
                <i className="fas fa-list-ul"></i>
                <span>Ma Sélection</span>
              </button>

              {/* Bouton Connexion */}
              <button className="nav-btn">
                <i className="fas fa-user-circle"></i>
                <span>Connexion</span>
              </button>
            </div>
          </header>

          <main className="main-content">
            <div style={{height: '250px', background: '#333', margin: '0 40px 40px 40px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', border: '1px solid #444'}}>
                <h1>Contenu à la Une</h1>
            </div>
            {categories.map(cat => <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />)}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
