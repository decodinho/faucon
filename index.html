<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  <!-- Ajout de FontAwesome pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Le moteur Video.js -->
  <!-- À mettre dans le <head> -->
  <link href="https://vjs.zencdn.net" rel="stylesheet"/>
  <script src="https://vjs.zencdn.net"></script>

  
  <!-- Ton fichier externe -->
  <script src="playerFalcon.js"></script>

  <style>
    :root {
      --jw-blue: #005086;
      --jw-bg: #1a1a1a;
      --jw-card-bg: #ffffff;
      --text-main: black;
      --turquoise: #40E0D0;
      --nav-bg: #24292E; 
      --live-red: #FF4B4B;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--jw-bg);
      color: var(--text-main);
    }

    /* Header mis à jour */
    .navbar {
      background-color:  #24292E;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
    
    .nav-right { display: flex; align-items: center; gap: 15px; }

    /* Boutons de la barre de navigation */
    .nav-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid white;
      color: white;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .nav-btn:hover { background: white; color: var(--turquoise); }

    .main-content { padding: 20px 0; }

    .category-section { margin-bottom: 30px; }

    .category-header {
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .category-header h2 {
      font-size: 1.4rem;
      color: #48D1CC;
      margin: 0;
    }

    .video-gallery {
      display: flex;
      overflow-x: auto;
      padding: 10px 40px;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .video-gallery::-webkit-scrollbar { height: 6px; }
    .video-gallery::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

    /* Carte Vidéo avec bouton Sélection */
    .video-card {
      min-width: 260px;
      max-width: 260px;
      background: var(--jw-card-bg);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      cursor: pointer;
      position: relative;
    }

    .video-card:hover { transform: scale(1.03); }

    /* Bouton Playlist/Sélection */
    .btn-playlist {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
      z-index: 5;
    }

    .video-card:hover .btn-playlist { opacity: 1; }
    .btn-playlist:hover { background: var(--turquoise); transform: scale(1.1); }

    .thumbnail-container {
      position: relative;
      width: 100%;
      height: 146px;
      background-color: #000;
    }

    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }

    .duration-tag {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 2px;
    }

    .video-info { padding: 12px; }

    .video-info h3 {
      font-size: 0.95rem;
      margin: 0 0 5px 0;
      height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .video-info p { font-size: 0.8rem; color: #666; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const url = `https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com/dev/read?category=${categoryKey}`;
        fetch(url)
          .then(res => res.json())
          .then(data => {
            let parsed = typeof data === 'string' ? JSON.parse(data) : data;
            if (parsed && !Array.isArray(parsed)) parsed = [parsed];
            setVideos(parsed || []);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section className="category-section">
          <div className="category-header">
            <h2>{title}</h2>
            <span style={{color: '#666', fontSize: '0.9rem', cursor: 'pointer'}}>Tout afficher ></span>
          </div>
          <div className="video-gallery">
            {loading ? (
              <p style={{color:'white'}}>Chargement...</p>
            ) : (
              videos.map((v, i) => (
                <div className="video-card" onClick={() => window.lancerStreaming(v.hls_manifest_url)} key={v.PK || i}>
                  <button className="btn-playlist" title="Ajouter à la sélection">
                    <i className="fas fa-plus"></i>
                  </button>
                  <div className="thumbnail-container">
                    <img src={v.thumbnail_url || v.image || "https://via.placeholder.com"} alt={v.title} />
                    {v.duration_seconds && (
                      <span className="duration-tag">
                        {Math.floor(v.duration_seconds / 60)}:{(v.duration_seconds % 60).toString().padStart(2, '0')}
                      </span>
                    )}
                  </div>
                  <div className="video-info">
                    <h3>{v.title || "Sans titre"}</h3>
                    <p>{v.uploader_id?.replace('USER#', '') || "Falcon"}</p>
                  </div>
                </div>
              ))
            )}
          </div>
        </section>
      );
    }

    function App() {
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports et Loisirs" },
        { id: "Cuisine", label: "Art Culinaire" },
        { id: "Learning", label: "Programmes Éducatifs" }
      ];

      return (
        <div className="app-container">
          <header className="navbar">
            <div className="logo-section">
              <i className="fas fa-bars" style={{cursor:'pointer'}}></i>
              <span><em>falcon</em></span>
            </div>
            
            <div className="nav-right">
              {/* Bouton Langues */}
               <button className="nav-btn">
                <i className="fas fa-globe"></i>
                live
              </button>
              <button className="nav-btn">
                <i className="fas fa-globe"></i>
                Langues
              </button>
              <button className="nav-btn">
                <i className="fas fa-globe"></i>
                watch with friends
              </button>
              {/* Bouton Connexion */}
              <button className="nav-btn">
                <i className="fas fa-user-circle"></i>
                Connexion
              </button>

              <i className="fas fa-search" style={{cursor:'pointer', marginLeft:'10px'}}></i>
            </div>
          </header>

          <main className="main-content">
             <div style={{height: '300px', background: 'linear-gradient(to right, #222, #444)', margin: '0 40px 40px 40px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white'}}>
                <h1>live soon ...</h1>
             </div>

            {categories.map(cat => (
              <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />
            ))}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
