<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Purple Edition</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <!-- Scripts React -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [choix, setChoix] = useState("All");
            const [videos, setVideos] = useState([]);
            const [loading, setLoading] = useState(true);

            // Liste des catégories pour ton menu
            const categories = ["All", "Sport", "Learning", "Music", "News", "Cuisine"];

            useEffect(() => {
                setLoading(true);
                // On suit ta logique d'API avec paramètre de catégorie
                // Remplace par ton URL réelle
                const url = `https://ton-api.execute-api.us-east-1.amazonaws.com{choix}`;

                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        let videosVraies = typeof data === 'string' ? JSON.parse(data) : data;
                        if (videosVraies && !Array.isArray(videosVraies)) {
                            videosVraies = [videosVraies];
                        }
                        setVideos(videosVraies || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Erreur API :", err);
                        setLoading(false);
                    });
            }, [choix]); // Se déclenche sans clic (au début) et à chaque changement de 'choix'

            return (
                <div className="app-wrapper">
                    {/* BARRE DE NAVIGATION */}
                    <header className="navbar">
                        <div className="nav-left">
                            <i className="fas fa-bars"></i>
                            <div className="logo">
                                <i className="fab fa-youtube"></i>
                                <span>falcon</span>
                            </div>
                        </div>
                        <div className="nav-center">
                            <div className="search-box">
                                <input type="text" placeholder="Rechercher une vidéo..." />
                                <button><i className="fas fa-search"></i></button>
                            </div>
                            <div className="mic-icon"><i className="fas fa-microphone"></i></div>
                        </div>
                        <div className="nav-right">
                            <i className="fas fa-video"></i>
                            <i className="fas fa-bell"></i>
                            <button className="login-btn" onClick={() => window.location.href='connexion.html'}>
                                <i className="fas fa-user-circle"></i> Se connecter
                            </button>
                        </div>
                    </header>

                    <main className="container">
                        {/* BARRE LATÉRALE */}
                        <aside className="sidebar">
                            <div className="nav-item active"><i className="fas fa-home"></i><span>Home</span></div>
                            <div className="nav-item"><i className="fas fa-upload"></i><span>Upload</span></div>
                            <div className="nav-item"><i className="fas fa-bolt"></i><span>Shorts</span></div>
                            <hr />
                            <div className="nav-item"><i className="fas fa-history"></i><span>History</span></div>
                        </aside>

                        {/* SECTION PRINCIPALE */}
                        <section className="main-content">
                            {/* FILTRE DE CATÉGORIES */}
                            <div className="category-wrapper">
                                {categories.map(cat => (
                                    <div 
                                        key={cat}
                                        className={`category-item ${choix === cat ? 'active' : ''}`}
                                        onClick={() => setChoix(cat)}
                                    >
                                        <span>{cat}</span>
                                    </div>
                                ))}
                            </div>

                            {/* GRILLE DE VIDÉOS */}
                            <div className="video-grid">
                                {loading ? (
                                    <p>Chargement des vidéos...</p>
                                ) : videos.length > 0 ? (
                                    videos.map((video) => (
                                        <div className="video-card" key={video.PK || video.id}>
                                            <div 
                                                className="thumbnail" 
                                                style={{ 
                                                    backgroundImage: `url(${video.thumbnail_url || 'https://via.placeholder.com'})`,
                                                    backgroundSize: 'cover',
                                                    backgroundPosition: 'center'
                                                }}
                                            >
                                                {video.duration_seconds && (
                                                    <span className="duration">
                                                        {Math.floor(video.duration_seconds / 60)}:{(video.duration_seconds % 60).toString().padStart(2, '0')}
                                                    </span>
                                                )}
                                            </div>
                                            <div className="video-info">
                                                <div className="channel-icon"></div>
                                                <div className="text-content">
                                                    <h3>{video.title}</h3>
                                                    <p>{video.uploader_id?.replace('USER#', '') || 'Falcon Creator'}</p>
                                                    <p>{video.category} • {new Date(video.created_at * 1000).toLocaleDateString()}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <p>Aucune vidéo trouvée pour "{choix}"</p>
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
