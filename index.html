<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  
  <!-- Chargement des icônes et des bibliothèques nécessaires -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>
  <script src="https://unpkg.com"></script>

  <style>
    :root {
      --jw-bg: #1a1a1a;
      --jw-card-bg: #ffffff;
      --turquoise: #40E0D0; /* Couleur demandée */
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--jw-bg);
      color: white;
    }

    /* Barre de navigation avec les 3 boutons à droite */
    .navbar {
      background-color: var(--turquoise);
      color: white;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.3rem; }
    
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Design des boutons de la navbar */
    .nav-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 7px 15px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .nav-btn:hover { background: white; color: var(--turquoise); }

    .main-content { padding: 20px 0; }
    .category-header { padding: 0 40px; margin-bottom: 15px; }
    .category-header h2 { font-size: 1.5rem; color: var(--turquoise); margin: 0; }

    .video-gallery { 
      display: flex; 
      overflow-x: auto; 
      padding: 10px 40px; 
      gap: 20px; 
      scrollbar-width: thin; 
    }
    
    /* Scrollbar personnalisée */
    .video-gallery::-webkit-scrollbar { height: 6px; }
    .video-gallery::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

    .video-card {
      min-width: 260px;
      background: var(--jw-card-bg);
      border-radius: 5px;
      overflow: hidden;
      color: black;
    }

    .thumbnail { width: 100%; height: 146px; background: #000; object-fit: cover; }
    .video-info { padding: 12px; }
    .video-info h3 { font-size: 0.95rem; margin: 0; height: 2.4em; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Lien API complet
        fetch(`https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com{categoryKey}`)
          .then(res => res.json())
          .then(data => {
            const parsed = typeof data === 'string' ? JSON.parse(data) : data;
            setVideos(Array.isArray(parsed) ? parsed : [parsed]);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section style={{marginBottom: '40px'}}>
          <div className="category-header"><h2>{title}</h2></div>
          <div className="video-gallery">
            {loading ? <p>Chargement...</p> : videos.map((v, i) => (
              <div className="video-card" key={i}>
                <img className="thumbnail" src={v.thumbnail_url || v.image || "https://via.placeholder.com"} alt="" />
                <div className="video-info">
                  <h3>{v.title || "Vidéo Falcon"}</h3>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function App() {
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports" }
      ];

      return (
        <div>
          <header className="navbar">
            <div className="logo-section">
              <i className="fas fa-bars"></i>
              <span>FALCON</span>
            </div>
            
            <div className="nav-right">
              <button className="nav-btn"><i className="fas fa-globe"></i><span>Langues</span></button>
              <button className="nav-btn"><i className="fas fa-list"></i><span>Ma sélection</span></button>
              <button className="nav-btn"><i className="fas fa-user"></i><span>Connexion</span></button>
            </div>
          </header>

          <main className="main-content">
            <div style={{height: '250px', background: '#252525', margin: '0 40px 40px 40px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid #333'}}>
                <h1 style={{color: 'white'}}>À la Une</h1>
            </div>
            {categories.map(cat => <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />)}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
