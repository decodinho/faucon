<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Purple Edition</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Composant pour l'affichage de la grille
    function ListeProduits({ produits }) {
      if (!Array.isArray(produits) || produits.length === 0) {
        return <p style={{color: "white", padding: "20px"}}>Aucune vidéo trouvée dans cette catégorie.</p>;
      }

      return (
        <React.Fragment>
          {produits.map((p, index) => (
            <div className="video-card" key={p.PK || index}>
              <div 
                className="thumbnail" 
                style={{ 
                  backgroundImage: `url(${p.thumbnail_url || p.image})`,
                  backgroundSize: 'cover',
                  backgroundPosition: 'center',
                  position: 'relative'
                }}
              >
                {p.duration_seconds && (
                  <span className="duration" style={{position: 'absolute', bottom: '8px', right: '8px', background: 'rgba(0,0,0,0.8)', color: 'white', padding: '2px 5px', borderRadius: '4px', fontSize: '12px'}}>
                    {Math.floor(p.duration_seconds / 60)}:{(p.duration_seconds % 60).toString().padStart(2, '0')}
                  </span>
                )}
              </div>
              <div className="video-info">
                <div className="channel-icon"></div>
                <div className="text-content">
                  <h3>{p.title || "Titre de la vidéo"}</h3>
                  <p>{p.uploader_id?.replace('USER#', '') || "Falcon Creator"} • {p.category}</p>
                  <p>{new Date(p.created_at * 1000).toLocaleDateString()}</p>
                </div>
              </div>
            </div>
          ))}
        </React.Fragment>
      );
    }

    function App() {
      const [choix, setChoix] = useState("All");
      const [videos, setVideos] = useState([]);

      useEffect(() => {
        // Correction de l'URL avec le paramètre de catégorie
        const url = `https://l1upgx0w59.execute-api.us-east-1.amazonaws.com{choix}`;
        
        fetch(url)
          .then(res => res.json())
          .then(data => {
            let dataVraie = typeof data === 'string' ? JSON.parse(data) : data;
            if (dataVraie && !Array.isArray(dataVraie)) dataVraie = [dataVraie];
            setVideos(dataVraie || []);
          })
          .catch(err => console.error("Erreur BDD:", err));
      }, [choix]);

      const categories = [
        { name: "All", color: "red" },
        { name: "Live", color: "green" },
        { name: "News", color: "blue" },
        { name: "Sport", color: "orange" },
        { name: "Cuisine", color: "purple" },
        { name: "Watched", color: "pink" },
        { name: "Music", color: "brown" },
        { name: "Learning", color: "beige" }
      ];

      return (
        <div className="app-container">
          <header className="navbar">
            <div className="nav-left">
              <i className="fas fa-bars"></i>
              <div className="logo"><i className="fab fa-youtube"></i><span>falcon</span></div>
            </div>
            <div className="nav-center">
              <div className="search-box">
                <input type="text" placeholder="Rechercher" />
                <button><i className="fas fa-search"></i></button>
              </div>
              <div className="mic-icon"><i className="fas fa-microphone"></i></div>
            </div>
            <div className="nav-right">
              <i className="fas fa-shopping-cart icon-btn"></i>
              <i className="fas fa-video"></i>
              <i className="fas fa-bell"></i>
              <button className="login-btn"><i className="fas fa-user-circle"></i> Se connecter</button>
            </div>
          </header>

          <main className="container">
            <aside className="sidebar">
              <div className="nav-item active"><i className="fas fa-home"></i><span>Home</span></div>
              <div className="nav-item"><i className="fas fa-film"></i><span>Upload</span></div>
              <div className="nav-item"><i className="fas fa-bolt"></i><span>Shorts</span></div>
              <hr/>
              <div className="nav-item"><i className="fas fa-history"></i><span>History</span></div>
            </aside>

            <section className="video-grid">
              <div className="category-wrapper">
                {categories.map((cat) => (
                  <div 
                    key={cat.name}
                    className={`category-item ${choix === cat.name ? "active" : ""}`}
                    onClick={() => setChoix(cat.name)}
                    style={{ cursor: 'pointer' }}
                  >
                    <span className={`dot dot-${cat.color}`}></span>
                    <span>{cat.name}</span>
                  </div>
                ))}
              </div>
              
              <ListeProduits produits={videos} />
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
