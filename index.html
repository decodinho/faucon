<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcon Stream Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --jw-blue: #005086;
      --jw-bg: #1a1a1a;
      --jw-card-bg: #ffffff;
      --text-main: #005086;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--jw-bg);
      color: var(--text-main);
    }

    /* Header style JW */
    .navbar {
      background-color: #40E0D0;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo-section { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
    
    /* Layout vertical */
    .main-content { padding: 20px 0; }

    /* Section de catégorie (Ligne horizontale) */
    .category-section {
      margin-bottom: 30px;
    }

    .category-header {
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .category-header h2 {
      font-size: 1.4rem;
      color: #48D1CC;
      margin-bottom: 5px;
    }

    /* Galerie horizontale */
    .video-gallery {
      display: flex;
      overflow-x: auto;
      padding: 10px 40px;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .video-gallery::-webkit-scrollbar { height: 6px; }
    .video-gallery::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

    /* Carte Vidéo style JW */
    .video-card {
      min-width: 260px;
      max-width: 260px;
      background: var(--jw-card-bg);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      cursor: pointer;
    }

    .video-card:hover { transform: scale(1.03); }

    .thumbnail-container {
      position: relative;
      width: 100%;
      height: 146px;
      background-color: #000;
    }

    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }

    .duration-tag {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 2px;
    }

    .video-info {
      padding: 12px;
    }

    .video-info h3 {
      font-size: 0.95rem;
      margin: 0 0 5px 0;
      line-height: 1.3;
      height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .video-info p {
      font-size: 0.8rem;
      color: #666;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Composant pour une ligne de galerie (Catégorie)
    function VideoRow({ title, categoryKey }) {
      const [videos, setVideos] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const url = `https://1tdc4hjrug.execute-api.us-east-1.amazonaws.com/dev/read?category=${categoryKey}`;
        fetch(url)
          .then(res => res.json())
          .then(data => {
            let parsed = typeof data === 'string' ? JSON.parse(data) : data;
            if (parsed && !Array.isArray(parsed)) parsed = [parsed];
            setVideos(parsed || []);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [categoryKey]);

      if (!loading && videos.length === 0) return null;

      return (
        <section className="category-section">
          <div className="category-header">
            <h2>{title}</h2>
            <span style={{color: '#666', fontSize: '0.9rem', cursor: 'pointer'}}>Tout afficher ></span>
          </div>
          <div className="video-gallery">
            {loading ? (
              <p>Chargement...</p>
            ) : (
              videos.map((v, i) => (
                <div className="video-card" key={v.PK || i}>
                  <div className="thumbnail-container">
                    <img src={v.thumbnail_url || v.image || "https://via.placeholder.com"} alt={v.title} />
                    {v.duration_seconds && (
                      <span className="duration-tag">
                        {Math.floor(v.duration_seconds / 60)}:{(v.duration_seconds % 60).toString().padStart(2, '0')}
                      </span>
                    )}
                  </div>
                  <div className="video-info">
                    <h3>{v.title || "Sans titre"}</h3>
                    <p>{v.uploader_id?.replace('USER#', '') || "Falcon"}</p>
                  </div>
                </div>
              ))
            )}
          </div>
        </section>
      );
    }

    function App() {
      // Liste des catégories à afficher verticalement
      const categories = [
        { id: "news", label: "Actualités" },
        { id: "Music", label: "Musique" },
        { id: "Sport", label: "Sports et Loisirs" },
        { id: "Cuisine", label: "Art Culinaire" },
        { id: "Learning", label: "Programmes Éducatifs" }
      ];

      return (
        <div className="app-container">
          <header className="navbar">
            <div className="logo-section">
              <i className="fas fa-bars"></i>
              <span>FALCON STREAM</span>
            </div>
            <div className="nav-right">
              <i className="fas fa-search" style={{marginRight: '20px'}}></i>
              <i className="fas fa-user-circle"></i>
            </div>
          </header>

          <main className="main-content">
             {/* Bannière principale type Hero (Optionnel) */}
             <div style={{height: '300px', background: '#333', margin: '0 40px 40px 40px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white'}}>
                <h1>Contenu à la Une</h1>
             </div>

             {/* Rendu des lignes par catégories */}
            {categories.map(cat => (
              <VideoRow key={cat.id} title={cat.label} categoryKey={cat.id} />
            ))}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
